<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bayesova Kalkulačka - Cyberpunk Edition</title>
    <style>
        :root {
            --bg-color: #080112; /* Temně fialová */
            --frame-purple: #3a0ca3;
            --neon-pink: #f72585; /* Zářivě růžová */
            --neon-green: #00ff66; /* Neonově zelená pro akce a výsledky */
            --text-color: #fdf0f6;
            --input-bg: #140524;
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Celý ohraničený obdélník */
        .calc-frame {
            width: 100%;
            max-width: 480px;
            background: rgba(20, 5, 36, 0.9);
            border: 2px solid var(--neon-pink);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.6), 
                        inset 0 0 10px rgba(247, 37, 133, 0.3);
            margin: 10px auto;
        }

        h1 {
            font-size: 1.6rem;
            text-align: center;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .info-badge {
            display: none;
            border: 1px solid var(--neon-green);
            background: rgba(0, 255, 102, 0.1);
            color: var(--neon-green);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 4px var(--neon-green);
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.2);
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--neon-pink);
            text-shadow: 0 0 2px var(--neon-pink);
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 2px solid var(--frame-purple);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        /* Skrytí šipek (spinners) v číselných polích */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield; /* Pro Firefox */
        }

        input:focus, textarea:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 10px rgba(247, 37, 133, 0.5);
        }

        /* Stylování šoupátek (sliders) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin-top: 12px;
        }
        
        input[type="range"]:focus {
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: var(--frame-purple);
            border-radius: 3px;
            box-shadow: 0 0 5px var(--frame-purple);
        }
        
        input[type="range"]::-webkit-slider-thumb {
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: var(--neon-pink);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px;
            box-shadow: 0 0 12px var(--neon-pink);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
            background: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
        }

        .hint {
            font-size: 0.75rem;
            color: #9c82b0;
            margin-top: 4px;
        }

        /* Tlačítko Spočítat */
        .btn-calc {
            width: 100%;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 5px;
            text-shadow: 0 0 5px var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2), inset 0 0 5px rgba(0, 255, 102, 0.1);
            transition: all 0.2s ease;
        }

        .btn-calc:active {
            background: rgba(0, 255, 102, 0.2);
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* Výsledkový box */
        .result-box {
            display: none;
            margin-top: 25px;
            padding: 18px;
            border: 2px solid var(--neon-green);
            background: rgba(0, 255, 102, 0.05);
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.3), inset 0 0 6px rgba(0, 255, 102, 0.1);
        }

        .result-box h2 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
            color: var(--neon-pink);
            text-align: center;
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--neon-green);
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 15px var(--neon-green);
        }

        textarea {
            height: 120px;
            font-size: 0.8rem;
            resize: none;
            border-color: var(--frame-purple);
        }

        .btn-copy {
            width: 100%;
            background: transparent;
            border: 1px solid #a88bb8;
            color: #a88bb8;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s ease;
        }

        .btn-copy:active {
            background: rgba(247, 37, 133, 0.2);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        .auto-filled {
            border-color: var(--neon-green) !important;
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.4) !important;
        }
    </style>
</head>
<body>

<div class="calc-frame">
    <h1>Bayesova Kalkulačka</h1>
    
    <div class="info-badge" id="infoBadge">✓ Databáze se načítá...</div>

    <div class="form-group">
        <label>Hypotéza / Příčina (A)</label>
        <input type="text" id="hypothesys" list="scenarios" placeholder="Vyberte scénář nebo pište...">
        <datalist id="scenarios"></datalist>
    </div>

    <div class="form-group">
        <label>Pozorovaný důkaz (B)</label>
        <input type="text" id="evidence" placeholder="Událost, která nastala">
    </div>

    <div class="form-group">
        <label>Apriorní pravděpodobnost P(A) v %</label>
        <input type="number" id="pA" placeholder="0" min="0" max="100" step="any">
        <input type="range" id="pA_range" min="0" max="100" step="1" value="0">
    </div>

    <div class="form-group">
        <label>Pravděpodobnost shody P(B|A) v %</label>
        <input type="number" id="pBA" placeholder="0" min="0" max="100" step="any">
        <input type="range" id="pBA_range" min="0" max="100" step="1" value="0">
    </div>

    <div class="form-group">
        <label>Falešný poplach P(B|ne-A) v %</label>
        <input type="number" id="pBnotA" placeholder="0" min="0" max="100" step="any">
        <input type="range" id="pBnotA_range" min="0" max="100" step="1" value="0">
    </div>

    <button class="btn-calc" onclick="calculateBayes()">Spočítat pravděpodobnost</button>

    <div class="result-box" id="resultBox">
        <h2>Aposteriorní pravděpodobnost</h2>
        <div class="result-value" id="finalResult">0.00 %</div>
        
        <label style="color: var(--neon-pink); text-shadow: 0 0 3px var(--neon-pink);">Shrnutí pro AI:</label>
        <textarea id="aiSummary" readonly></textarea>
        <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">Kopírovat pro AI</button>
    </div>
</div>

<script>
    // ---------------------------------------------------------
    // ZDE VLOŽTE ODKAZ NA VAŠI PUBLIKOVANOU GOOGLE TABULKU (TSV)
    // ---------------------------------------------------------
    const sheetUrl = "VLOŽTE_VÁŠ_ZKOPIROVANÝ_ODKAZ_ZDE"; 
    
    let db = {}; 

    // Synchronizace ručních inputů a šoupátek
    const syncInputs = () => {
        ['pA', 'pBA', 'pBnotA'].forEach(id => {
            const numInput = document.getElementById(id);
            const rangeInput = document.getElementById(id + '_range');

            // Změna v číselném poli posune šoupátko
            numInput.addEventListener('input', () => {
                if(numInput.value !== '') {
                    rangeInput.value = numInput.value;
                    calculateBayes();
                }
            });

            // Změna na šoupátku přepíše číslo
            rangeInput.addEventListener('input', () => {
                numInput.value = rangeInput.value;
                calculateBayes();
            });
        });
    };
    syncInputs();

    // Načtení dat při startu aplikace
    async function loadDataFromGoogleSheet() {
        if(sheetUrl === "VLOŽTE_VÁŠ_ZKOPIROVANÝ_ODKAZ_ZDE") {
            const badge = document.getElementById('infoBadge');
            badge.innerText = "⚠ Google Tabulka není napojena";
            badge.style.display = 'block';
            badge.style.borderColor = "var(--neon-pink)";
            badge.style.color = "var(--neon-pink)";
            return;
        }

        try {
            const response = await fetch(sheetUrl);
            const tsvText = await response.text();
            
            const rows = tsvText.split('\n');
            const datalist = document.getElementById('scenarios');
            datalist.innerHTML = ''; 
            db = {}; 

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split('\t'); 
                
                if (cols.length >= 6 && cols[0].trim() !== "") {
                    const originalName = cols[0].trim();
                    const key = originalName.toLowerCase();
                    
                    db[key] = {
                        hypothesys: cols[1].trim(),
                        evidence: cols[2].trim(),
                        pA: parseFloat(cols[3].replace(',', '.')),
                        pBA: parseFloat(cols[4].replace(',', '.')),
                        pBnotA: parseFloat(cols[5].replace(',', '.'))
                    };

                    const option = document.createElement('option');
                    option.value = originalName;
                    datalist.appendChild(option);
                }
            }
        } catch (error) {
            console.error("Chyba při načítání:", error);
        }
    }

    window.onload = loadDataFromGoogleSheet;

    // Sledování změn v políčku hypotézy
    const inputHypo = document.getElementById('hypothesys');
    inputHypo.addEventListener('input', function(e) {
        const key = e.target.value.toLowerCase().trim();
        const fields = ['hypothesys', 'evidence', 'pA', 'pBA', 'pBnotA'];
        
        if (db[key]) {
            document.getElementById('hypothesys').value = db[key].hypothesys;
            document.getElementById('evidence').value = db[key].evidence;
            
            // Vyplnění čísel
            document.getElementById('pA').value = db[key].pA;
            document.getElementById('pBA').value = db[key].pBA;
            document.getElementById('pBnotA').value = db[key].pBnotA;
            
            // Vyplnění šoupátek
            document.getElementById('pA_range').value = db[key].pA;
            document.getElementById('pBA_range').value = db[key].pBA;
            document.getElementById('pBnotA_range').value = db[key].pBnotA;

            fields.forEach(f => document.getElementById(f).classList.add('auto-filled'));
            
            const badge = document.getElementById('infoBadge');
            badge.innerText = "✓ Scénář načten";
            badge.style.borderColor = "var(--neon-green)";
            badge.style.color = "var(--neon-green)";
            badge.style.display = 'block';
            
            setTimeout(() => { badge.style.display = 'none'; }, 2000);

            calculateBayes();
        } else {
            fields.forEach(f => document.getElementById(f).classList.remove('auto-filled'));
        }
    });

    // Hlavní funkce pro výpočet Bayesovy věty
    function calculateBayes() {
        const nameA = document.getElementById('hypothesys').value || "Nezadáno";
        const nameB = document.getElementById('evidence').value || "Nezadáno";
        
        let pA = parseFloat(document.getElementById('pA').value);
        let pBA = parseFloat(document.getElementById('pBA').value);
        let pBnotA = parseFloat(document.getElementById('pBnotA').value);

        if (isNaN(pA) || isNaN(pBA) || isNaN(pBnotA)) {
            return; 
        }

        pA = pA / 100;
        pBA = pBA / 100;
        pBnotA = pBnotA / 100;

        const pNotA = 1 - pA;
        const pB = (pBA * pA) + (pBnotA * pNotA);
        
        let pAB = 0;
        if (pB > 0) {
            pAB = (pBA * pA) / pB;
        }

        // Změna formátování na 2 desetinná místa dle požadavku
        const resultPercent = (pAB * 100).toFixed(2);

        document.getElementById('finalResult').innerText = resultPercent + ' %';
        document.getElementById('resultBox').style.display = 'block';

        const summaryText = `[BAYESIAN ANALYSIS REPORT]\nHypothesis (A): ${nameA}\nEvidence (B): ${nameB}\n\nParameters:\n- Prior Probability P(A): ${document.getElementById('pA').value}%\n- Likelihood / True Positive P(B|A): ${document.getElementById('pBA').value}%\n- False Positive P(B|¬A): ${document.getElementById('pBnotA').value}%\n\nResult:\n- Posterior Probability P(A|B): ${resultPercent}%\n\nPlease use this calculated posterior probability in our further discussion.`;

        document.getElementById('aiSummary').value = summaryText;
    }

    // Kopírování do schránky
    function copyToClipboard() {
        const copyText = document.getElementById("aiSummary");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Zkopírováno!";
            btn.style.borderColor = "var(--neon-green)";
            btn.style.color = "var(--neon-green)";
            setTimeout(() => {
                btn.innerText = "Kopírovat pro AI";
                btn.style.borderColor = "#a88bb8";
                btn.style.color = "#a88bb8";
            }, 2000);
        });
    }
</script>

</body>
</html>
